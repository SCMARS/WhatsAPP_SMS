version: "3.9"

# ONE COMMAND: docker compose up -d --build
# Everything starts automatically: postgres, app, ngrok tunnel

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wrwa
      POSTGRES_PASSWORD: wrwa_secret
      POSTGRES_DB: wr_whatsapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wrwa -d wr_whatsapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://wrwa:wrwa_secret@postgres:5432/wr_whatsapp
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - AGENT_ID=${AGENT_ID}
      - INSTANCE_ID=${INSTANCE_ID}
      - INSTANCE_API_TOKEN=${INSTANCE_API_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - DEBUG=${DEBUG:-false}
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE=http://localhost:8001
      - VITE_API_SECRET_KEY=${API_SECRET_KEY}
    depends_on:
      - app
    restart: unless-stopped

  ngrok:
    image: ngrok/ngrok:latest
    command:
      - "http"
      - "--domain=unbewildering-unwilfully-marcelo.ngrok-free.dev"
      - "app:8000"
    environment:
      - NGROK_AUTHTOKEN=35HWr5J0C5BuB6rsp53ta8kRWMm_52gtf61AdWrXoE833GjiC
    ports:
      - "4040:4040"
    depends_on:
      - app
    restart: unless-stopped

volumes:
  pgdata:
