version: "3.9"

# LOCAL DEVELOPMENT only
# For production use Railway

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wrwa
      POSTGRES_PASSWORD: wrwa_secret
      POSTGRES_DB: wr_whatsapp
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wrwa -d wr_whatsapp"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://wrwa:wrwa_secret@postgres:5432/wr_whatsapp
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - API_SECRET_KEY=${API_SECRET_KEY}
      - AGENT_ID=${AGENT_ID}
      - INSTANCE_ID=${INSTANCE_ID}
      - INSTANCE_API_TOKEN=${INSTANCE_API_TOKEN}
      - DEBUG=${DEBUG:-false}
      - PORT=8000
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - .:/app  # hot reload for dev

volumes:
  pgdata:
